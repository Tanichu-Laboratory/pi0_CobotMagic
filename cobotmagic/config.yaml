# ====== policy settings ======
policy_backend: "openvla"  # "openpi" or "openvla"

# ====== pi0-side settings ======
openpi:
  policy_config_name: "pi0_mobile_aloha_lora_local"  # src/openpi/training/config.py の設定名
  checkpoint_dir: "/workspace/project/openpi/checkpoints/pi0_mobile_aloha_local/mobile_aloha_lora/10000"  # ローカルパスまたはgs://
  rgb_hw: [256, 256]  # 画像前処理サイズ（H, W）

# ====== OpenVLA-OFT server settings ======
openvla:
  base_checkpoint: "/workspace/project/openvla-oft/checkpoints/checkpoint_files/SFT_models/stack_three"
  adapter_dir: "/workspace/project/openvla-oft/runs/stack_three_vifailback_lora_10k_3cam_20fps_gpu0_3_ddp_bs3x2/lora_adapter"
  processor_dir: "/workspace/project/openvla-oft/runs/stack_three_vifailback_lora_10k_3cam_20fps_gpu0_3_ddp_bs3x2"
  dataset_statistics: "/workspace/project/openvla-oft/runs/stack_three_vifailback_lora_10k_3cam_20fps_gpu0_3_ddp_bs3x2/dataset_statistics.json"
  proprio_projector: "/workspace/project/openvla-oft/runs/stack_three_vifailback_lora_10k_3cam_20fps_gpu0_3_ddp_bs3x2/proprio_projector--smoke.pt"
  unnorm_key: "stack_three_lerobot_success_20fps"
  num_images_in_input: 3
  center_crop: true
  merge_lora: true
  device: "cuda:0"

task_prompt: "stack the three cubes"

# ====== ROS-side settings ======
ros:
  # "raw" = sensor_msgs/Image を橋側でJPEG化,  "compressed" = /compressed をそのまま転送
  image_type: "raw"
  jpeg_quality: 80
  rate_hz: 20
  policy_response_timeout_sec: 5.0
  action_mode: "absolute"  # OpenVLA-OFT ALOHA actions are absolute left/right joint targets.
  open_loop_steps: 8       # Execute only this many steps from each returned chunk, then re-query.
  delta_clip:
    enabled: true
    max_delta: [0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.01]

  # 同一マシン・あなたのトピック一覧に合わせた既定値
  topics:
    img_front: "/camera_f/color/image_raw"
    img_left:  "/camera_l/color/image_raw"
    img_right: "/camera_r/color/image_raw"
    puppet_arm_left:  "/puppet/joint_left"
    puppet_arm_right: "/puppet/joint_right"
    cmd_joint_left:  "/master/joint_left"
    cmd_joint_right: "/master/joint_right"
    enable_flag: "/enable_flag"   # 任意（Bool）。存在しなければ無視
  publish_enable_flag: true        # Piper側が /enable_flag=True を要求するため、起動時にpublishする

  # モバイルベース（速度）制御を使う場合のみ true にし、対応トピックを追記
  use_robot_base: false
  robot_base_topics:
    odom: "/odom_raw"   # 例。必要時に正しいトピックへ変更
    cmd_vel: "/cmd_vel"
  clip:
    v_max: 0.2
    w_max: 0.6

  home_position:
    left: [-0.0010295446263626218, 0.30587080121040344, -0.393717885017395, 0.005400840658694506, 0.5136011838912964, 0.08619414269924164, -0.003028000006452203]
    right: [0.07645199447870255, 0.3571706712245941, -0.38943028450012207, -0.07059866189956665, 0.5584428906440735, 0.015449974685907364, -0.0025159993674606085]

# ====== ZMQ transport (same machine) ======
zmq:
  socket_type: "req"
  server_bind:    "tcp://127.0.0.1:5555"  # OpenPIサーバ待受
  client_connect: "tcp://127.0.0.1:5555"  # ROSブリッジからの接続先
